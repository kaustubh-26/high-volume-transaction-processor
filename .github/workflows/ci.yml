name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    uses: ./.github/workflows/tests-analysis.yml
    secrets: inherit
