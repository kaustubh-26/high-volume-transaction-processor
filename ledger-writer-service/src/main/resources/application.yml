spring:
  application:
    name: ledger-writer-service

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ledger-writer-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 200
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.kaustubh.transactions.common.event
        spring.json.value.default.type: com.kaustubh.transactions.common.event.TransactionLogEvent
    listener:
      ack-mode: manual

  datasource:
    url: jdbc:postgresql://localhost:5432/payments
    username: postgres
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

app:
  kafka:
    listener:
      concurrency: 6
    topic:
      transaction-log: transaction_log
      webhook-dispatch: webhook_dispatch

  ledger:
    batch-size: 200

  webhook:
    delivery:
      max-poll-records: 100
      connect-timeout: 2s
      read-timeout: 5s

  reconciliation:
    enabled: true
    fixed-delay-ms: 60000
    lookback-minutes: 15

  replay:
    enabled-on-startup: false
    consumer-group-id: ledger-replay-group
    max-poll-records: 200
    poll-timeout-ms: 1000
    idle-stop-after-polls: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
