name: Tests And Analysis

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure Maven Wrapper Is Executable
        run: chmod +x mvnw

      # Run ONLY unit tests
      - name: Run Unit Tests
        run: ./mvnw -B -ntp -Dtest="*Test,!*IntegrationTest" test

      # Upload compiled classes + coverage data
      - name: Upload Unit Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-artifacts
          path: |
            **/target/classes
            **/target/jacoco.exec

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure Maven Wrapper Is Executable
        run: chmod +x mvnw

      # Run ONLY integration tests
      - name: Run Integration Tests
        run: ./mvnw -B -ntp -Dtest="*IntegrationTest" -Dsurefire.failIfNoSpecifiedTests=false test

      # Upload coverage + classes again (merged later)
      - name: Upload Integration Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-artifacts
          path: |
            **/target/classes
            **/target/jacoco.exec

  sonar-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure Maven Wrapper Is Executable
        run: chmod +x mvnw

      # Download artifacts from previous jobs
      - name: Download Unit Test Artifacts
        uses: actions/download-artifact@v4
        with:
          name: unit-test-artifacts
          path: .

      - name: Download Integration Test Artifacts
        uses: actions/download-artifact@v4
        with:
          name: integration-test-artifacts
          path: .

      # Rebuild ONLY (no tests) to ensure proper structure + aggregate report
      - name: Rebuild Project (No Tests)
        run: ./mvnw -B -ntp -DskipTests=true verify

      # Run Sonar WITHOUT re-running tests
      - name: SonarCloud Analysis
        run: |
          ./mvnw -B -ntp sonar:sonar \
            -DskipTests=true \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=kaustubh-26 \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.exclusions=api-service/src/main/resources/META-INF/**,api-service/src/main/resources/static/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}