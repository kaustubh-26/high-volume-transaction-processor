spring:
  application:
    name: processor-service

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: processor-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.kaustubh.transactions.common.event
        spring.json.value.default.type: com.kaustubh.transactions.common.event.TransactionRequestEvent
        spring.json.use.type.headers: false
    producer:
      acks: all
      retries: 10
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
    listener:
      ack-mode: manual

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

app:
  kafka:
    listener:
      concurrency: 6
    topic:
      transaction-requests: transaction_requests
      transaction-log: transaction_log
      webhook-dispatch: webhook_dispatch

  idempotency:
    key-prefix: "txn:idem:"
    ttl-hours: 48

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
